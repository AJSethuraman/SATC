worksheet_id: leverage_v1
worksheet_name: Leverage & Liquidity
version: '1.0'

inputs:
  section_name: Balance Sheet & Earnings
  lines:
    - {key: current_assets, label: Current assets}
    - {key: current_liabilities, label: Current liabilities}
    - {key: total_liabilities, label: Total liabilities}
    - {key: tangible_net_worth, label: Tangible net worth}
    - {key: total_debt, label: Total funded debt}
    - {key: ebitda, label: EBITDA}

thresholds:
  min_current_ratio: 1.20   # current assets / current liabilities
  max_debt_to_worth: 4.0    # total liabilities / tangible net worth
  max_debt_to_ebitda: 4.0   # total funded debt / EBITDA
