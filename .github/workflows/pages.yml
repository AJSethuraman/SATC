name: Deploy website to GitHub Pages

# Publishes the static marketing site in ./website to GitHub Pages.
# One-time setup: in the repo, go to Settings → Pages → "Build and deployment"
# → Source → select "GitHub Actions". After that, every push to main that
# touches ./website redeploys the live site automatically.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically (Source = GitHub Actions)
        # so there's no manual settings toggle to flip. If your org restricts this,
        # set it once by hand: Settings → Pages → Source → "GitHub Actions".
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
