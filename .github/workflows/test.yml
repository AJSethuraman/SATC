name: Tests

# Run the SATC test suite on every push and PR — separate from the Windows
# desktop build, so logic regressions are caught even when no release is cut.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    name: pytest (satc_system)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: satc_system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
