modules:
  - module_id: w2_wages
    display_name: W-2 Wages
    trigger_docs: [w-2, w2]
    expected_critical_docs: [w-2]
    review_needed_docs: [state wage withholding support]
    optional_support_docs: [prior year return]
    client_questions:
      - Please confirm whether all W-2 forms for the year are included.
    preparer_notes:
      - Confirm multi-state withholding where applicable.
  - module_id: investments
    display_name: Investments
    trigger_docs: [1099-int, 1099-div, 1099-b, brokerage, consolidated 1099]
    expected_critical_docs: [consolidated 1099 brokerage package]
    review_needed_docs: [supplemental gain/loss detail, foreign tax paid support]
    optional_support_docs: [year-end holdings statement]
    client_questions:
      - We found investment-related documents. Please confirm whether any additional brokerage accounts exist.
    preparer_notes:
      - Verify completeness of all 1099 schedules, especially basis reporting.
  - module_id: self_employed_schedule_c
    display_name: Schedule C / Self-Employed
    trigger_docs: [1099-nec, schedule c, business receipts, business bank]
    expected_critical_docs: [income summary for business activity]
    review_needed_docs: [expense detail by category, vehicle/mileage support, home office support]
    optional_support_docs: [quarterly estimate payment support]
    client_questions:
      - Please provide a business income and expense summary if not already included.
    preparer_notes:
      - Check for potential mixed personal/business expenses.
  - module_id: rental_property
    display_name: Rental Property
    trigger_docs: [lease, rent ledger, schedule e, property tax, mortgage interest, rental insurance, repair receipts]
    expected_critical_docs: [rental income summary or rent ledger]
    review_needed_docs:
      - mortgage interest statement if financed
      - property tax support
      - insurance support
      - repairs and maintenance detail
      - HOA dues if applicable
      - utilities if owner-paid
      - management fees if applicable
      - depreciation schedule or prior-year return if returning client
      - closing statement if purchased, sold, or refinanced
    optional_support_docs: [photos or listing records for vacancy timeline]
    client_questions:
      - Was the property rented for the full year?
      - Was it vacant at any point?
      - Did you buy, sell, or refinance the property?
      - Were any repairs actually improvements?
      - Did you personally use the property?
    preparer_notes:
      - Review whether repairs should be capitalized.
      - Confirm depreciation schedule if this is not a first-year rental.
  - module_id: homeowner_mortgage
    display_name: Homeowner / Mortgage
    trigger_docs: [1098, mortgage interest, property tax]
    expected_critical_docs: [1098 mortgage interest statement]
    review_needed_docs: [property tax support, points paid support if refinance/purchase]
    optional_support_docs: [closing disclosure]
    client_questions:
      - If you refinanced or purchased a home, please provide closing documents.
    preparer_notes:
      - Confirm mortgage interest limitation considerations manually.
