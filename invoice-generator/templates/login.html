{% extends "base.html" %}
{% block title %}Log in · Invoicer{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h1>Log in</h1>
    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" value="{{ email }}" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center">Log in</button>
    </form>

    {% if unverified %}
    <form method="post" action="{{ url_for('resend_verification') }}" style="margin-top:10px">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="email" value="{{ email }}">
      <button type="submit" class="btn btn-ghost btn-sm" style="width:100%; justify-content:center">Resend confirmation email</button>
    </form>
    {% endif %}

    <p class="help" style="margin-top:14px; text-align:center">
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
    </p>
    <p class="help" style="text-align:center">
      No account? <a href="{{ url_for('signup') }}">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
