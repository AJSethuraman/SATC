<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Log in · Invoicer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
<style>
  body { background:#fff; }
  .auth { min-height:100vh; display:grid; grid-template-columns: 1fr 1fr; }
  .auth__brand { background: var(--navy-900); color:#fff; padding: var(--space-12); display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
  .auth__brand::before { content:""; position:absolute; top:-120px; right:-120px; width:360px; height:360px; border-radius:50%; background: radial-gradient(circle, rgba(37,99,235,.35), transparent 70%); }
  .auth__quote { font-size: var(--text-2xl); font-weight:700; letter-spacing:-.02em; line-height:1.3; max-width:420px; position:relative; }
  .auth__quote em { color: var(--brand-300); font-style:normal; }
  .auth__meta { display:flex; gap: var(--space-8); position:relative; }
  .auth__meta .kpi__value { color:#fff; } .auth__meta .kpi__label { color: var(--brand-300); }
  .auth__form { display:flex; align-items:center; justify-content:center; padding: var(--space-12); }
  .auth__card { width:100%; max-width:380px; }
  .auth__card h1 { font-size: var(--text-3xl); font-weight:800; letter-spacing:-.02em; }
  .auth__card .sub { color: var(--gray-600); margin: var(--space-2) 0 var(--space-8); }
  .auth__alt { text-align:center; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--gray-600); }
  .forgot { font-size: var(--text-sm); font-weight:600; }
  .gmark { width:20px;height:20px;border-radius:50%;background:#fff;border:1px solid var(--gray-300);color:#475569;font-weight:800;display:inline-flex;align-items:center;justify-content:center;font-size:12px; }
  .or { display:flex; align-items:center; gap: var(--space-3); margin: var(--space-6) 0; color: var(--gray-400); font-size: var(--text-xs); font-weight:600; letter-spacing:.06em; text-transform:uppercase; }
  .or::before,.or::after { content:""; height:1px; background: var(--hairline); flex:1; }
  @media (max-width: 820px){ .auth{ grid-template-columns:1fr;} .auth__brand{ display:none;} }
</style>
</head>
<body>
<div class="auth">
  <aside class="auth__brand">
    <a class="logo" href="{{ url_for('index') }}" style="color:#fff; position:relative">
      <span class="logo__mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h11l3 3v15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M9 9h6M9 13h6M9 17h3"/></svg></span>
      <span style="color:#fff; font-size:var(--text-lg); font-weight:700">Invoicer</span>
    </a>
    <p class="auth__quote">Send a polished invoice and get paid online — <em>keeping 100% of your money</em>.</p>
    <div class="auth__meta">
      <div class="kpi"><span class="kpi__label">Avg. time to send</span><span class="kpi__value">48s</span></div>
      <div class="kpi"><span class="kpi__label">Platform fee</span><span class="kpi__value">$0</span></div>
    </div>
  </aside>

  <main class="auth__form">
    <div class="auth__card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to manage your invoices and payments.</p>

      {% include "_flashes.html" %}

      <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="field">
          <label class="label">Email</label>
          <input class="input" type="email" name="email" placeholder="you@business.com" value="{{ email or '' }}" required autofocus/>
        </div>
        <div class="field">
          <div class="row between" style="margin-bottom:var(--space-2)">
            <label class="label" style="margin:0">Password</label>
            <a class="forgot" href="{{ url_for('forgot_password') }}">Forgot?</a>
          </div>
          <input class="input" type="password" name="password" required/>
        </div>
        <label class="checkbox" style="margin-top:var(--space-4)"><input type="checkbox" name="remember" checked/> <span>Keep me signed in on this device</span></label>
        <button class="btn btn--block btn--lg" type="submit" style="margin-top:var(--space-6)">Log in</button>
      </form>

      {% if unverified %}
      <form method="post" action="{{ url_for('resend_verification') }}" style="margin-top:var(--space-4)">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <input type="hidden" name="email" value="{{ email or '' }}"/>
        <button class="btn btn--secondary btn--block" type="submit">Resend confirmation email</button>
      </form>
      {% endif %}

      <p class="auth__alt">New to Invoicer? <a href="{{ url_for('signup') }}" style="font-weight:600">Create an account</a></p>
    </div>
  </main>
</div>
</body>
</html>
