{% extends "base.html" %}
{% block title %}Log in · Invoicer{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h1>Log in</h1>
    <form method="post" action="{{ url_for('login') }}">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" value="{{ email }}" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center">Log in</button>
    </form>
    <p class="help" style="margin-top:14px; text-align:center">
      No account? <a href="{{ url_for('signup') }}">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
