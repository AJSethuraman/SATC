{% extends "base.html" %}
{% block title %}Sign up · Invoicer{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h1>Create your account</h1>
    <form method="post" action="{{ url_for('signup') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" value="{{ email }}" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
        <p class="help">At least 8 characters.</p>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" name="confirm" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center">Sign up</button>
    </form>
    <p class="help" style="margin-top:14px; text-align:center">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
