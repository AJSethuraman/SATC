# One-command run:  docker compose up
# Then open http://localhost:5000
services:
  web:
    build: .
    ports:
      - "5000:5000"
    # Loads STRIPE_*, SMTP_*, API_KEY, etc. Copy .env.example to .env first.
    env_file:
      - .env
    environment:
      # Persist the SQLite DB on a named volume (survives container rebuilds).
      DATABASE_URL: "sqlite:////app/data/invoices.db"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:5000}"
    volumes:
      - invoice_data:/app/data            # database
      - invoice_pdfs:/app/invoices        # generated PDFs
      - invoice_uploads:/app/static/uploads  # uploaded logos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  invoice_data:
  invoice_pdfs:
  invoice_uploads:
