# Render Blueprint (https://render.com) for a hosted deployment.
#
# Easiest path: in the Render dashboard, New -> Blueprint, connect this repo.
# (If the app is in the invoice-generator subfolder of a larger repo, set the
# service Root Directory to invoice-generator.) Render builds the Dockerfile,
# provisions a Postgres database, wires DATABASE_URL, and generates a secret.
# You then fill in the Stripe/SMTP values (marked sync:false) in the dashboard.
services:
  - type: web
    name: invoicer
    runtime: docker
    plan: free          # upgrade to "starter" for an always-on instance (no cold starts)
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: PDF_ENGINE
        value: weasyprint        # the Docker image includes WeasyPrint's native libs
      - key: FLASK_SECRET_KEY
        generateValue: true      # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: invoicer-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false              # set to your live URL, e.g. https://invoicer.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false

databases:
  - name: invoicer-db
    plan: free          # free Postgres; upgrade for more storage / no expiry
