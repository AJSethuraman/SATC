# Render Blueprint (https://render.com) for the Invoicer app.
#
# One-click deploy: use the "Deploy to Render" button in
# invoice-generator/README.md, or in Render choose New -> Blueprint and pick
# this repo. Render reads this file, builds the Docker image from the
# invoice-generator folder, provisions a PostgreSQL database, wires
# DATABASE_URL, and generates FLASK_SECRET_KEY. You then paste your Stripe /
# SMTP values (the ones marked sync:false) in the dashboard.
services:
  - type: web
    name: invoicer
    runtime: docker
    dockerfilePath: ./invoice-generator/Dockerfile
    dockerContext: ./invoice-generator
    plan: free          # change to "starter" for an always-on instance (no cold starts)
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: PDF_ENGINE
        value: weasyprint        # the Docker image includes WeasyPrint's native libs
      - key: FLASK_SECRET_KEY
        generateValue: true      # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: invoicer-db
          property: connectionString
      # APP_BASE_URL is auto-detected from Render's RENDER_EXTERNAL_URL.
      # Fill these in the dashboard when you're ready to take payments / email:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false

databases:
  - name: invoicer-db
    plan: free          # free Postgres; upgrade for more storage / no expiry
