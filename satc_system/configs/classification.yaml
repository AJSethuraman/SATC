# Content-based document classification.
#
# The classifier reads each file and decides what it is, preferring cheap, exact
# signals before paid OCR — the ladder is: PDF form fields -> embedded PDF text ->
# filename hint -> vision/OCR. This file holds the per-type signatures.
#
#   key            extraction-config key (configs/extraction/<key>.yaml); null if
#                  the document is real but not a data-bearing tax form (filed, not
#                  extracted).
#   label          how the type is shown to the preparer.
#   code           short tag used when the file is re-labeled / sorted.
#   filename_hints lowercase substrings that hint at the type in a file *name*
#                  (weak — only used if the content is silent). List specific
#                  before generic.
#   title_markers  lowercase phrases that appear in the document's *text layer*
#                  (the form's printed title/markers). Strong and free.
#
# Form-field markers are derived automatically from the extraction config's
# field paths (e.g. w2.box1_wages -> "w2box1wages"), so a fillable form is
# fingerprinted by its own field names with no extra config.
doc_types:
  - key: w2
    label: "W-2"
    code: "W-2"
    filename_hints: ["w2", "w-2", "wage and tax"]
    title_markers: ["wage and tax statement", "form w-2", "w-2 wage"]

  - key: 1099int
    label: "1099-INT"
    code: "1099-INT"
    filename_hints: ["1099int", "1099-int", "1099 int"]
    title_markers: ["1099-int", "interest income"]

  - key: 1099div
    label: "1099-DIV"
    code: "1099-DIV"
    filename_hints: ["1099div", "1099-div", "1099 div"]
    title_markers: ["1099-div", "dividends and distributions"]

  - key: k1_1120s
    label: "Schedule K-1 (1120-S)"
    code: "K-1-1120S"
    filename_hints: ["k1_1120s", "k-1 1120s", "1120s k-1", "k1s"]
    title_markers: ["shareholder's share", "form 1120-s", "1120s"]

  - key: k1_1065
    label: "Schedule K-1 (1065)"
    code: "K-1-1065"
    filename_hints: ["k1_1065", "k-1 1065", "1065 k-1", "k1p"]
    title_markers: ["partner's share", "form 1065"]

  - key: prior_1040
    label: "Prior-year 1040"
    code: "1040-PY"
    filename_hints: ["prior", "1040"]
    title_markers: ["u.s. individual income tax return", "form 1040"]

  # Generic K-1 hint (used only when the filename can't tell 1120-S from 1065 and
  # the text layer is silent). Defaults to the S-corp map.
  - key: k1_1120s
    label: "Schedule K-1"
    code: "K-1"
    filename_hints: ["k1", "k-1", "schedule k-1"]
    title_markers: ["schedule k-1"]

  # Real documents that are filed but not data-extracted (key: null).
  - key: null
    label: "Engagement letter"
    code: "Engagement"
    filename_hints: ["engagement"]
    title_markers: ["engagement letter", "terms of engagement"]

  - key: null
    label: "Form 8879 (e-file authorization)"
    code: "8879"
    filename_hints: ["8879"]
    title_markers: ["e-file signature authorization", "form 8879"]

  - key: null
    label: "Tax organizer"
    code: "Organizer"
    filename_hints: ["organizer"]
    title_markers: ["tax organizer", "client organizer"]
