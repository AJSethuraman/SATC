meta:
  return_type: "1120"
  title: "Form 1120 — C-Corporation Income Tax Workpaper"
  subtitle: "Workpaper only — Drake is the system of record for depreciation, NOL, and the filed return."

sections:
  - title: "Entity"
    rows:
      - {id: state_code, kind: input_text, label: "Primary state (OH / MI / MA / ...)", source: "Vault home state", fmt: text}
      - {kind: note, label: "C-corp pays tax at the entity level (flat 21% federal). Watch the charitable 10%-of-taxable-income limit and NOL usage."}

  - title: "Income"
    rows:
      - {id: gross_receipts, kind: input, label: "Gross receipts or sales", source: "Books"}
      - {id: cogs, kind: input, label: "Cost of goods sold", source: "Books / inventory"}
      - {id: gross_profit, kind: computed, label: "Gross profit", formula: "{gross_receipts}-{cogs}"}
      - {id: dividends_received, kind: input, label: "Dividends", source: "1099-DIV"}
      - {id: interest_income, kind: input, label: "Interest", source: "1099-INT"}
      - {id: other_income, kind: input, label: "Other income", source: "Books"}
      - {id: total_income, kind: total, label: "Total income", formula: "{gross_profit}+{dividends_received}+{interest_income}+{other_income}"}

  - title: "Deductions"
    rows:
      - {id: officer_comp, kind: input, label: "Compensation of officers", source: "Payroll"}
      - {id: salaries_wages, kind: input, label: "Salaries & wages", source: "Payroll"}
      - {id: rents, kind: input, label: "Rents", source: "Leases"}
      - {id: taxes_licenses, kind: input, label: "Taxes & licenses", source: "Books"}
      - {id: depreciation, kind: input, label: "Depreciation (per Drake)", source: "Drake depreciation (system of record)"}
      - {id: other_deductions, kind: input, label: "Other deductions (excl. charitable)", source: "Books"}
      - {id: deductions_before_charity, kind: total, label: "Deductions before charitable & special deductions", formula: "{officer_comp}+{salaries_wages}+{rents}+{taxes_licenses}+{depreciation}+{other_deductions}"}

  - title: "Charitable contribution — 10% limitation"
    rows:
      - {id: taxable_before_charity, kind: computed, label: "Taxable income before charitable & DRD & NOL", formula: "{total_income}-{deductions_before_charity}"}
      - {id: charitable_claimed, kind: input, label: "Charitable contributions claimed", source: "Books / acknowledgments"}
      - {id: charity_cf, kind: cflink, label: "  Charitable carryover (from data mart)", formula: "[CF CHARITABLE]", source: "Prior-year carryforward"}
      - {id: charitable_limit, kind: computed, label: "10% of taxable income (charitable ceiling)", formula: "0.10*MAX(0,{taxable_before_charity})"}
      - {id: charitable_allowed, kind: computed, label: "Charitable deduction allowed (lesser of claimed+CF and 10% limit)", formula: "MIN({charitable_claimed}+{charity_cf},{charitable_limit})"}
      - {id: charity_limit_check, kind: crosscheck, label: "Charitable over the 10% limit (excess carries forward 5 yrs)", formula: "MAX(0,({charitable_claimed}+{charity_cf})-{charitable_limit})", flag_ok: "within limit", flag_bad: "carryforward created"}

  - title: "NOL deduction"
    rows:
      - {id: nol_cf, kind: cflink, label: "NOL carryforward available (from data mart)", formula: "[CF NOL]", source: "Prior-year carryforward"}
      - {id: income_after_charity, kind: computed, label: "Income after charitable deduction", formula: "{taxable_before_charity}-{charitable_allowed}"}
      - {id: nol_limit, kind: computed, label: "NOL usable (80% of income, post-2017 NOLs)", formula: "0.80*MAX(0,{income_after_charity})"}
      - {id: nol_used, kind: computed, label: "NOL deduction used (lesser of available and 80% limit)", formula: "MIN({nol_cf},{nol_limit})"}
      - {id: taxable_income, kind: total, label: "Taxable income", formula: "MAX(0,{income_after_charity}-{nol_used})"}

  - title: "Tax"
    rows:
      - {id: corp_rate, kind: input, label: "Federal C-corp rate", source: "IRC 11 (flat 21%)", fmt: pct}
      - {id: tax_computed, kind: computed, label: "Federal income tax (rate x taxable income)", formula: "{taxable_income}*{corp_rate}"}
      - {id: tax_per_drake, kind: input, label: "Federal income tax (per Drake)", source: "Drake 1120"}
      - {id: tax_tie, kind: crosscheck, label: "Computed tax ties to Drake (watch credits/AMT/special items)", formula: "{tax_computed}-{tax_per_drake}", flag_ok: "ties", flag_bad: "REVIEW — credits/special items?"}

  - title: "Schedule M-1 — book-to-tax reconciliation"
    rows:
      - {id: book_income, kind: input, label: "Net income per books (after tax)", source: "Financials"}
      - {id: m1_fed_tax, kind: input, label: "+ Federal income tax per books", source: "Books"}
      - {id: m1_add, kind: input, label: "+ Expenses on books not deducted (50% meals, etc.)", source: "Books"}
      - {id: m1_subtract, kind: input, label: "- Income on books not on return", source: "Books"}
      - {id: m1_other, kind: input, label: "+/- Other timing differences", source: "Drake / books"}
      - {id: m1_income, kind: computed, label: "M-1 reconciled taxable income (pre-NOL/special)", formula: "{book_income}+{m1_fed_tax}+{m1_add}-{m1_subtract}+{m1_other}"}
      - {id: m1_tie, kind: crosscheck, label: "M-1 ties to taxable income before NOL/special deductions", formula: "{m1_income}-{income_after_charity}"}

  - title: "Schedule L — balance sheet tie"
    rows:
      - {id: total_assets, kind: input, label: "Total assets (end of year)", source: "Books / Drake Sch L"}
      - {id: total_liabilities, kind: input, label: "Total liabilities", source: "Books"}
      - {id: total_equity, kind: input, label: "Total stockholders' equity", source: "Books"}
      - {id: sch_l_tie, kind: crosscheck, label: "Assets = Liabilities + Equity", formula: "{total_assets}-({total_liabilities}+{total_equity})"}

  - title: "State & apportionment"
    rows:
      - {id: apportion_sales_state, kind: input, label: "In-state sales", source: "Books"}
      - {id: apportion_sales_total, kind: input, label: "Total sales everywhere", source: "Books"}
      - {id: apportion_factor, kind: computed, label: "Apportionment factor (single sales factor)", formula: "IF({apportion_sales_total}=0,0,{apportion_sales_state}/{apportion_sales_total})", fmt: pct}
      - {id: state_taxable_income, kind: computed, label: "Income apportioned to state", formula: "{taxable_income}*{apportion_factor}"}
      - {id: state_tax_per_drake, kind: input, label: "State income tax (per Drake)", source: "Drake state return"}

  - title: "Reconciliation & sign-off"
    rows:
      - {id: drake_taxable, kind: input, label: "Drake taxable income (Form 1120 line 30)", source: "Drake 1120"}
      - {id: rec_taxable, kind: crosscheck, label: "Difference: workpaper vs Drake taxable income", formula: "{taxable_income}-{drake_taxable}"}
      - {id: signoff, kind: review, label: "Preparer sign-off: 1120 reconciles to Drake; NOL & charitable carryovers carried to data mart.", gating: true}
