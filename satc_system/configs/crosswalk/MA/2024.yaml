  source_label: "Mass. Gen. Laws ch. 62; Mass.gov tax rates (2024)"
  retrieved: "2026-06-17"
  status: in_force
  notes: >
    Massachusetts individual income tax 2024 — flat 5% on most income (Part B),
    8.5% on short-term capital gains, plus the 4% surtax on taxable income over the
    indexed millionaire threshold. No standard deduction; uses personal exemptions.

