Subject: Invoice {{Invoice Number}} from {{Firm Name}}
<html>
  <body>
    <p>Hello {{Contact First Name}},</p>
    <p>Please find invoice <strong>{{Invoice Number}}</strong> for {{Service Description}}.</p>
